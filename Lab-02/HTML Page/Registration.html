<!DOCTYPE html>
<html>
    <title> Registration Page </title>
    <body>
        <link rel="stylesheet" href="Style.css">
    <head>
        <h1> Patient Registration (Adnmission) </h1>
    </head>

    <form>
        <label for ="Name">Patient Name: </label>
        <input type ="text" id="Name" name ="PatientName" placeholder = "Enter the Name"> <br><br>

        <label for="Age">Age:</label>
        <input type="number" id="Age" name="PatientAge"><br><br>

        <label for="DOB"> Date of Birth: </label>
        <input type="date" id="DOB" name ="PatientDOB"> <br><br>

        <label for="GenderMale"> Male: </label>
        <input type = "radio" id="GenderMale" name="Gender" value="Male">
        
        <br><br>

        <label for="GenderFemale"> Female: </label>
        <input type = "radio" id="GenderFemale" name="Gender" value="Female">

        
        <br><br>

        <label for="Address">Address:</label>
        <textarea id="Address" name ="PatientAddress" rows="4" cols="30" placeholder="Enter The Address"></textarea>

        <br><br>

        <label for="InsertFiles">Patient Medical Report: </label>
        <input type ="file" id="InsertFiles" name="PatientFile">

        <br><br>

        <label for ="Doctor">Prefered Doctor Lists: </label>
       
        <select>
            <option values="Default"> </option>
            <option values="Cardiac"> Cardiac</option>
            <option values="Skin"> Skin </option>
        </select>

        <br><br>

        <label for="Submit">Submit Info: </label>
        <input type="submit" id="submit" name="DataSubmit">
        

    </form>
</body>
</html>
