<!DOCTYPE html>
<html>
    <title>Student Registration Page</title>
    <head>
        <h1>Student Registration Page</h1>
    </head>
<body>
    
    <form>
        <label for="Name">Student Name:</label>
        <input type="text" id="Name" name="StudentName" placeholder="Enter Your Name"><br><br>

        <label for="CGPA">Student CGPA:</label>
        <input type="number" id="CGPA" name="StudentCGPA" placeholder="Enter Your CGPA"><br><br>

        <label for="GenderMale">Male</label>
        <input type="radio" id="GenderMale" name="Gender" value="Male">
        
        <br><br>

        <label for="GenderFemale">Female</label>
        <input type="radio" id="GenderFemale" name="Gender" value="Female">

        <br><br>

        <label for="Department">Select Department:</label>
        <select id="Department" name="Department">
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="BBA">BBA</option>
            <option value="LAW">LAW</option>
        </select>

        <br><br>

        <label for="StudentID">Student ID</label>
        <input type="text" id="StudentID" name="StudentID"><br><br>

        <label for="Address">Address:</label>
        <textarea id="Address" name="StudentAddress" rows="4" cols="30" placeholder="Enter your address here"></textarea>

        <br><br>

        <label for="DOB">Date of Birth:</label>
        <input type="date" id="DOB" name="StudentDOB"><br><br>

        <label for="Email">Email:</label>
        <input type="email" id="Email" name="StudentEmail" placeholder="Enter your email"><br><br>

        <label for="InsertFiles">Upload your Grade Report:</label>
        <input type="file" id="InsertFiles" name="StudentFile">

        <br><br>

        <label for="terms">I agree to the terms and conditions</label>
        <input type="checkbox" id="terms" name="terms">

        <br><br>

        <label for="Phone">Phone Number:</label>
        <input type="tel" id="Phone" name="StudentPhone" placeholder="Enter your phone number"><br><br>

        <label for="Submit">Submit your information</label><br>
        <input type="submit" id="submit" name="DataSubmit" value="Submit">
        
    </form>
</body>
</html>
